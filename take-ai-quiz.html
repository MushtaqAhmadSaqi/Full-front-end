<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Take AI Quiz — COMSATSPrepHub</title>

  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="styles/tailwind-built.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="qz-styles.css" />

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(14, 165, 233, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.12), transparent 30%),
        #f8fafc;
      color: #0f172a;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .quiz-shell {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 18px 70px;
    }

    .quiz-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .quiz-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      padding: 26px;
    }

    .question-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 18px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.05);
    }

    .option-label {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 14px 16px;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s ease;
      background: #fff;
    }

    .option-label:hover {
      border-color: #38bdf8;
      background: #f0f9ff;
    }

    .option-label.selected {
      border-color: #0ea5e9;
      background: #e0f2fe;
    }

    .option-label.correct {
      border-color: #22c55e;
      background: #dcfce7;
    }

    .option-label.wrong {
      border-color: #ef4444;
      background: #fee2e2;
    }

    .option-label.locked {
      cursor: default;
    }

    .explanation-box {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #334155;
      font-size: 14px;
      line-height: 1.6;
    }

    .explanation-box.show {
      display: block;
    }

    .submit-wrap {
      position: sticky;
      bottom: 18px;
      z-index: 30;
      margin-top: 28px;
      display: flex;
      justify-content: center;
    }

    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: none;
      border-radius: 999px;
      padding: 15px 28px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      color: #fff;
      font-weight: 900;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.25);
      cursor: pointer;
    }

    .submit-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      box-shadow: none;
    }

    .result-card {
      display: none;
      margin-top: 28px;
      text-align: center;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 28px;
      padding: 34px 24px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
    }

    .result-card.show {
      display: block;
    }

    .progress-track {
      height: 10px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      transition: width 0.25s ease;
    }

    @media (max-width: 640px) {
      .quiz-topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .quiz-card,
      .question-card {
        padding: 18px;
      }
    }

    /* =========================================================
       TAKE AI QUIZ — RESPONSIVE PREMIUM PATCH
       Front-end only. Quiz JS logic untouched.
       ========================================================= */

    .ai-take-page,
    body.ai-take-page {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 10% 0%, rgba(14, 165, 233, 0.16), transparent 28rem),
        radial-gradient(circle at 90% 0%, rgba(99, 102, 241, 0.12), transparent 26rem),
        #f8fafc;
    }

    .ai-take-page .quiz-shell {
      width: min(100%, 980px);
      padding: clamp(18px, 4vw, 34px) clamp(12px, 4vw, 22px) 78px;
    }

    .ai-take-page .quiz-topbar {
      position: sticky;
      top: 12px;
      z-index: 30;
      padding: 10px;
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    .ai-take-page .quiz-topbar a {
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      color: #0369a1 !important;
      text-decoration: none;
    }

    .ai-take-page .quiz-topbar a:hover {
      background: #e0f2fe;
    }

    .ai-take-page .quiz-topbar > div {
      min-height: 42px;
      background: #f8fafc !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.75);
    }

    /* Hero quiz summary card */
    .ai-take-page .quiz-card {
      position: relative;
      overflow: hidden;
      border-radius: 32px;
      border: 1px solid rgba(226, 232, 240, 0.95);
      background:
        radial-gradient(circle at top right, rgba(14, 165, 233, 0.13), transparent 34%),
        rgba(255, 255, 255, 0.94);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.1);
    }

    .ai-take-page .quiz-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 4px;
      background: linear-gradient(90deg, #0ea5e9, #2563eb, #4f46e5);
    }

    .ai-take-page #quiz-title {
      max-width: 760px;
      font-size: clamp(1.85rem, 6vw, 3rem);
      line-height: 1.04;
      letter-spacing: -0.055em;
    }

    .ai-take-page #quiz-meta {
      max-width: 720px;
      line-height: 1.65;
    }

    .ai-take-page .progress-track {
      height: 11px;
      background: #e2e8f0;
    }

    .ai-take-page .progress-fill {
      background: linear-gradient(90deg, #0ea5e9, #2563eb, #4f46e5);
    }

    /* Question cards */
    .ai-take-page #questions-container {
      display: grid;
      gap: 18px;
    }

    .ai-take-page .question-card {
      position: relative;
      overflow: hidden;
      margin-bottom: 0;
      padding: clamp(18px, 4vw, 28px);
      border-radius: 28px;
      border: 1px solid rgba(226, 232, 240, 0.95);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 16px 42px rgba(15, 23, 42, 0.07);
    }

    .ai-take-page .question-card::after {
      content: "";
      position: absolute;
      top: -90px;
      right: -90px;
      width: 190px;
      height: 190px;
      border-radius: 999px;
      background: rgba(14, 165, 233, 0.07);
      pointer-events: none;
    }

    .ai-take-page .question-card > * {
      position: relative;
      z-index: 1;
    }

    .ai-take-page .question-card h2 {
      font-size: clamp(1rem, 3.6vw, 1.25rem);
      line-height: 1.42;
      letter-spacing: -0.025em;
    }

    /* Options */
    .ai-take-page .option-label {
      min-height: 56px;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 16px;
      border-radius: 18px;
      border: 1.5px solid #e2e8f0;
      background: #ffffff;
      transition:
        transform 180ms ease,
        border-color 180ms ease,
        background-color 180ms ease,
        box-shadow 180ms ease;
    }

    .ai-take-page .option-label:hover {
      transform: translateX(4px);
      border-color: #38bdf8;
      background: #f0f9ff;
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.08);
    }

    .ai-take-page .option-label input {
      width: 18px;
      height: 18px;
      accent-color: #0ea5e9;
      flex: 0 0 auto;
    }

    .ai-take-page .option-label span:last-child {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: normal;
    }

    /* Submit button */
    .ai-take-page .submit-wrap {
      position: sticky;
      bottom: 12px;
      z-index: 25;
      display: flex;
      justify-content: center;
      margin-top: 24px;
      pointer-events: none;
    }

    .ai-take-page .submit-btn {
      pointer-events: auto;
      min-height: 54px;
      border-radius: 18px;
      padding: 0 24px;
      border: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .ai-take-page .submit-btn:not(:disabled):hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(37, 99, 235, 0.32);
    }

    .ai-take-page .submit-btn:disabled {
      color: #64748b;
    }

    /* Result */
    .ai-take-page .result-card {
      border-radius: 32px;
      background:
        radial-gradient(circle at top right, rgba(16, 185, 129, 0.12), transparent 34%),
        #ffffff;
    }

    /* Dark mode support if html/body receives .dark from your theme script */
    .dark .ai-take-page,
    html.dark .ai-take-page,
    html.dark body.ai-take-page {
      background:
        radial-gradient(circle at 10% 0%, rgba(56, 189, 248, 0.14), transparent 28rem),
        radial-gradient(circle at 90% 0%, rgba(129, 140, 248, 0.12), transparent 26rem),
        #0f172a;
      color: #f8fafc;
    }

    .dark .ai-take-page .quiz-topbar,
    html.dark .ai-take-page .quiz-topbar {
      background: rgba(15, 23, 42, 0.82);
      border-color: rgba(148, 163, 184, 0.22);
    }

    .dark .ai-take-page .quiz-topbar > div,
    html.dark .ai-take-page .quiz-topbar > div {
      background: rgba(255,255,255,0.055) !important;
      border-color: rgba(148, 163, 184, 0.22) !important;
      color: #cbd5e1 !important;
    }

    .dark .ai-take-page .quiz-card,
    .dark .ai-take-page .question-card,
    .dark .ai-take-page .result-card,
    html.dark .ai-take-page .quiz-card,
    html.dark .ai-take-page .question-card,
    html.dark .ai-take-page .result-card {
      background:
        radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.018)),
        #111827;
      border-color: rgba(148, 163, 184, 0.22);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.42);
    }

    .dark .ai-take-page #quiz-title,
    .dark .ai-take-page .question-card h2,
    .dark .ai-take-page .result-card h2 {
      color: #f8fafc !important;
    }

    .dark .ai-take-page #quiz-meta,
    .dark .ai-take-page #progress-text,
    .dark .ai-take-page #result-details {
      color: #cbd5e1 !important;
    }

    .dark .ai-take-page .option-label {
      background: rgba(255,255,255,0.045);
      border-color: rgba(148, 163, 184, 0.2);
      color: #e2e8f0;
    }

    .dark .ai-take-page .option-label:hover {
      background: rgba(56, 189, 248, 0.1);
      border-color: #38bdf8;
    }

    .dark .ai-take-page .option-label span:last-child {
      color: #e2e8f0 !important;
    }

    .dark .ai-take-page .progress-track {
      background: rgba(255,255,255,0.1);
    }

    /* Tablet */
    @media (max-width: 768px) {
      .ai-take-page .quiz-topbar {
        border-radius: 24px;
      }

      .ai-take-page .quiz-card {
        border-radius: 28px;
      }

      .ai-take-page .flex.items-center.justify-between.gap-4 {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
      }
    }

    /* Mobile */
    @media (max-width: 640px) {
      .ai-take-page .quiz-shell {
        padding: 14px 10px 92px;
      }

      .ai-take-page .quiz-topbar {
        position: relative;
        top: auto;
        flex-direction: column;
        align-items: stretch;
        border-radius: 22px;
        margin-bottom: 16px;
      }

      .ai-take-page .quiz-topbar a,
      .ai-take-page .quiz-topbar > div {
        width: 100%;
        justify-content: center;
      }

      .ai-take-page .quiz-card {
        padding: 20px !important;
        border-radius: 24px;
      }

      .ai-take-page #quiz-title {
        font-size: 1.75rem;
      }

      .ai-take-page #questions-container {
        margin-top: 18px !important;
        gap: 14px;
      }

      .ai-take-page .question-card {
        padding: 18px;
        border-radius: 22px;
      }

      .ai-take-page .question-card .flex.items-start.gap-3 {
        gap: 10px;
      }

      .ai-take-page .question-card .w-10 {
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 14px;
      }

      .ai-take-page .option-label {
        padding: 14px;
        gap: 10px;
      }

      .ai-take-page .option-label:hover {
        transform: none;
      }

      .ai-take-page .submit-wrap {
        left: 10px;
        right: 10px;
        bottom: 10px;
      }

      .ai-take-page .submit-btn {
        width: 100%;
        min-height: 56px;
      }

      .ai-take-page .result-card {
        padding: 24px 18px;
        border-radius: 24px;
      }

      .ai-take-page .result-card .flex {
        width: 100%;
      }

      .ai-take-page .result-card .submit-btn {
        width: 100%;
      }
    }

    /* Small phones */
    @media (max-width: 390px) {
      .ai-take-page .quiz-shell {
        padding-inline: 8px;
      }

      .ai-take-page .quiz-card,
      .ai-take-page .question-card {
        padding: 16px !important;
      }

      .ai-take-page .option-label {
        font-size: 0.92rem;
      }
    }
  </style>
</head>

<body class="ai-take-page">
  <main class="quiz-shell">
    <div class="quiz-topbar">
      <a href="ai-quiz-generator.html" class="inline-flex items-center gap-2 text-sm font-bold text-sky-700 hover:text-sky-900">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Back to Generator
      </a>

      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-slate-200 text-sm font-bold text-slate-600">
        <span class="material-symbols-outlined text-[18px]">timer</span>
        <span id="timer">00:00</span>
      </div>
    </div>

    <section class="quiz-card">
      <p class="text-xs font-black uppercase tracking-widest text-sky-600 mb-2">AI Generated Quiz</p>

      <h1 id="quiz-title" class="text-3xl sm:text-4xl font-black tracking-tight text-slate-950 mb-3">
        Loading quiz...
      </h1>

      <p id="quiz-meta" class="text-slate-500 text-sm mb-6">
        Answer all questions. The correct answers will appear only after final submission.
      </p>

      <div class="flex items-center justify-between gap-4 mb-2">
        <p id="progress-text" class="text-sm font-bold text-slate-600">0 / 0 answered</p>
        <p id="progress-percent" class="text-sm font-black text-sky-700">0%</p>
      </div>

      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </section>

    <section id="questions-container" class="mt-7"></section>

    <div class="submit-wrap">
      <button id="submit-btn" class="submit-btn" type="button" disabled>
        <span class="material-symbols-outlined">lock</span>
        Answer all questions to submit
      </button>
    </div>

    <section id="result-card" class="result-card">
      <p class="text-xs font-black uppercase tracking-widest text-sky-600 mb-2">Final Result</p>

      <h2 class="text-3xl font-black text-slate-950 mb-2">Quiz Completed</h2>

      <p id="result-score" class="text-5xl font-black text-sky-600 my-6">0%</p>

      <p id="result-details" class="text-slate-600 font-semibold mb-6"></p>

      <div class="flex flex-col sm:flex-row justify-center gap-3">
        <a href="ai-quiz-generator.html" class="submit-btn no-underline">
          <span class="material-symbols-outlined">refresh</span>
          Generate New Quiz
        </a>

        <a href="dashboard.html" class="submit-btn no-underline" style="background: linear-gradient(135deg, #10b981, #059669);">
          <span class="material-symbols-outlined">dashboard</span>
          View Dashboard
        </a>
      </div>
    </section>
  </main>

  <script>
    let quizData = null;
    let userAnswers = {};
    let startTime = Date.now();
    let timerInterval = null;
    let submitted = false;

    const quizTitle = document.getElementById('quiz-title');
    const quizMeta = document.getElementById('quiz-meta');
    const questionsContainer = document.getElementById('questions-container');
    const progressText = document.getElementById('progress-text');
    const progressPercent = document.getElementById('progress-percent');
    const progressFill = document.getElementById('progress-fill');
    const submitBtn = document.getElementById('submit-btn');
    const resultCard = document.getElementById('result-card');
    const resultScore = document.getElementById('result-score');
    const resultDetails = document.getElementById('result-details');
    const timerEl = document.getElementById('timer');

    function escapeHTML(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatTime(seconds) {
      const mins = String(Math.floor(seconds / 60)).padStart(2, '0');
      const secs = String(seconds % 60).padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function startTimer() {
      startTime = Date.now();

      timerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        timerEl.textContent = formatTime(elapsed);
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function loadQuiz() {
      try {
        quizData = JSON.parse(sessionStorage.getItem('currentAIQuiz') || 'null');
      } catch {
        quizData = null;
      }

      if (!quizData || !Array.isArray(quizData.questions) || quizData.questions.length === 0) {
        quizTitle.textContent = 'No quiz found';
        quizMeta.textContent = 'Please generate a quiz first.';
        questionsContainer.innerHTML = `
          <div class="question-card text-center">
            <p class="text-slate-600 mb-4">Your quiz session was not found or expired.</p>
            <a href="ai-quiz-generator.html" class="submit-btn no-underline">
              Generate Quiz Again
            </a>
          </div>
        `;
        submitBtn.style.display = 'none';
        return;
      }

      renderQuiz();
      startTimer();
    }

    function renderQuiz() {
      quizTitle.textContent = quizData.title || 'AI Generated Quiz';

      const subject = quizData.metadata?.subject || quizData.subject || 'Subject';
      const code = quizData.metadata?.subjectCode || '';
      const examType = quizData.metadata?.examType || quizData.examType || 'Exam';

      const subjectLabel = code ? `${subject} (${code})` : subject;
      quizMeta.textContent = `${subjectLabel} • ${examType} • ${quizData.questions.length} questions`;

      questionsContainer.innerHTML = '';

      quizData.questions.forEach((question, questionIndex) => {
        const options = Array.isArray(question.options) ? question.options : [];

        const card = document.createElement('article');
        card.className = 'question-card';
        card.dataset.questionIndex = questionIndex;

        card.innerHTML = `
          <div class="flex items-start gap-3 mb-5">
            <div class="w-10 h-10 rounded-2xl bg-sky-100 text-sky-700 grid place-items-center font-black shrink-0">
              ${questionIndex + 1}
            </div>

            <h2 class="text-lg sm:text-xl font-black text-slate-950 leading-snug">
              ${escapeHTML(question.question)}
            </h2>
          </div>

          <div class="space-y-3">
            ${options.map((option, optionIndex) => `
              <label class="option-label" data-question-index="${questionIndex}" data-option-index="${optionIndex}">
                <input
                  type="radio"
                  name="question-${questionIndex}"
                  value="${optionIndex}"
                  class="mt-1"
                />
                <span class="font-black text-slate-400">${String.fromCharCode(65 + optionIndex)}.</span>
                <span class="text-slate-700 font-semibold leading-relaxed">${escapeHTML(option)}</span>
              </label>
            `).join('')}
          </div>

          <div class="explanation-box" id="explanation-${questionIndex}">
            <strong>Explanation:</strong>
            ${escapeHTML(question.explanation || 'No explanation provided.')}
          </div>
        `;

        questionsContainer.appendChild(card);
      });

      document.querySelectorAll('.option-label input').forEach((input) => {
        input.addEventListener('change', handleOptionChange);
      });

      updateProgress();
    }

    function handleOptionChange(event) {
      if (submitted) return;

      const input = event.target;
      const questionIndex = Number(input.name.replace('question-', ''));
      const optionIndex = Number(input.value);

      userAnswers[questionIndex] = optionIndex;

      const card = document.querySelector(`[data-question-index="${questionIndex}"]`);

      card.querySelectorAll('.option-label').forEach((label) => {
        label.classList.remove('selected');
      });

      input.closest('.option-label').classList.add('selected');

      updateProgress();
    }

    function updateProgress() {
      const total = quizData?.questions?.length || 0;
      const answered = Object.keys(userAnswers).length;
      const percentage = total ? Math.round((answered / total) * 100) : 0;

      progressText.textContent = `${answered} / ${total} answered`;
      progressPercent.textContent = `${percentage}%`;
      progressFill.style.width = `${percentage}%`;

      if (answered === total && total > 0 && !submitted) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `
          <span class="material-symbols-outlined">check_circle</span>
          Submit Quiz
        `;
      } else if (!submitted) {
        submitBtn.disabled = true;
        submitBtn.innerHTML = `
          <span class="material-symbols-outlined">lock</span>
          Answer all questions to submit
        `;
      }
    }

    function submitQuiz() {
      if (!quizData || submitted) return;

      const total = quizData.questions.length;
      const answered = Object.keys(userAnswers).length;

      if (answered < total) {
        alert('Please answer all questions before submitting.');
        return;
      }

      submitted = true;
      stopTimer();

      let score = 0;

      quizData.questions.forEach((question, questionIndex) => {
        const correctAnswer = Number(question.correctAnswer);
        const selectedAnswer = Number(userAnswers[questionIndex]);

        if (selectedAnswer === correctAnswer) {
          score++;
        }

        const card = document.querySelector(`[data-question-index="${questionIndex}"]`);
        const labels = card.querySelectorAll('.option-label');

        labels.forEach((label) => {
          const optionIndex = Number(label.dataset.optionIndex);

          label.classList.add('locked');

          const input = label.querySelector('input');
          if (input) input.disabled = true;

          if (optionIndex === correctAnswer) {
            label.classList.add('correct');
          }

          if (optionIndex === selectedAnswer && selectedAnswer !== correctAnswer) {
            label.classList.add('wrong');
          }
        });

        const explanation = document.getElementById(`explanation-${questionIndex}`);
        if (explanation) explanation.classList.add('show');
      });

      const percentage = Math.round((score / total) * 100);
      const elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);

      submitBtn.style.display = 'none';

      resultScore.textContent = `${percentage}%`;
      resultDetails.textContent = `${score} / ${total} correct • Time: ${formatTime(elapsedSeconds)}`;

      resultCard.classList.add('show');
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

      saveResultToDashboard({
        score,
        total,
        percentage,
        elapsedSeconds,
      });
    }

    function saveResultToDashboard(result) {
      const subject = quizData.metadata?.subject || quizData.subject || 'AI Quiz';
      const examType = quizData.metadata?.examType || quizData.examType || 'Practice';

      const savedResult = {
        id: quizData.attemptId || `ai-quiz-${Date.now()}`,
        title: quizData.title || `${subject} Quiz`,
        subject,
        examType,
        score: result.score,
        total: result.total,
        percentage: result.percentage,
        elapsedSeconds: result.elapsedSeconds,
        completedAt: new Date().toISOString(),
        userAnswers,
        questions: quizData.questions,
      };

      const previousResults = JSON.parse(localStorage.getItem('quizResults') || '[]');

      const updatedResults = [
        savedResult,
        ...previousResults.filter((item) => item.id !== savedResult.id),
      ];

      localStorage.setItem('quizResults', JSON.stringify(updatedResults.slice(0, 50)));

      // Optional: Also save to savedQuizzes for historical backup
      const savedQuizzes = JSON.parse(localStorage.getItem('savedQuizzes') || '[]');
      const updatedQuizzes = [
        {
          ...quizData,
          savedAt: new Date().toISOString(),
          userAnswers,
          result: {
            score: result.score,
            total: result.total,
            percentage: result.percentage,
            elapsedSeconds: result.elapsedSeconds,
          }
        },
        ...savedQuizzes.filter(q => (q.attemptId || q.id) !== (quizData.attemptId || quizData.id))
      ];
      localStorage.setItem('savedQuizzes', JSON.stringify(updatedQuizzes.slice(0, 50)));
    }

    submitBtn.addEventListener('click', submitQuiz);

    loadQuiz();
  </script>
</body>
</html>
