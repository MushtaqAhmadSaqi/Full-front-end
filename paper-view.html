    <style>
      /* Smart Header - Hide on scroll down, show on scroll up */
      header {
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      header.header-hidden {
        transform: translateY(-100%);
      }

      /* Bug 4: prevent revealed model answers from breaking the mobile viewport */
      [id^="model-"] {
        max-width: 100%;
        overflow-x: auto;
      }

      [id^="model-"] .prose,
      .question-prose {
        max-width: 100%;
        overflow-wrap: anywhere;
        word-break: break-word;
        overflow-x: auto;
      }

      /* Make display math scrollable if too wide */
      mjx-container[display="true"] {
        max-width: 100%;
        overflow-x: auto !important;
        overflow-y: hidden;
      }

      [id^="model-"] pre,
      [id^="model-"] code {
        max-width: 100%;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      [id^="model-"] table {
        display: block;
        max-width: 100%;
        overflow-x: auto;
      }

      [id^="model-"] img,
      [id^="model-"] svg,
      [id^="model-"] canvas {
        max-width: 100%;
        height: auto;
      }

      /* Spacing inside question + answer prose blocks */
      .question-prose p,
      .question-prose li {
          margin: 0.55rem 0;           /* space between paragraphs / list items */
          line-height: 1.75;            /* comfortable reading height */
      }

      .question-prose br {
          display: block;
          content: "";
          margin-top: 0.5rem;           /* space when marked emits <br> */
      }

      .question-prose h1,
      .question-prose h2,
      .question-prose h3,
      .question-prose strong {
          display: inline-block;
          margin-top: 0.4rem;
      }

      /* Display equations get their own breathing room */
      .question-prose mjx-container[display="true"] {
          margin: 1rem 0 !important;
      }

      /* The solution panel — make every direct child breathe */
      .solution-prose > * + * {
          margin-top: 0.75rem;          /* stacks vertical rhythm between blocks */
      }

      .solution-prose p {
          margin: 0.6rem 0;
          line-height: 1.8;
      }

      .solution-prose mjx-container[display="true"] {
          margin: 1.1rem 0 !important;
      }

      .solution-prose hr {
          border: 0;
          border-top: 1px dashed #cbd5e1;
          margin: 1.25rem 0;
      }
      .dark .solution-prose hr { border-top-color: #334155; }


    </style>

</head>

    <script type="module">
        import { supabase, auth, escapeHtml } from './utils.js';
        import { sanitizeHtml } from './js/render-safety.js';
        import { logger } from './js/logger.js';
        import { ensureSubjectTracked, addSubjectMastery } from './js/progress-service.js';

        const DEPS = {
            mathjax: {
                ready: false,
                readyPromise: null,
                load: () => {
                    if (DEPS.mathjax.readyPromise) return DEPS.mathjax.readyPromise;
                    DEPS.mathjax.readyPromise = new Promise((resolve) => {
                        window.MathJax = {
                            tex: { 
                                inlineMath: [['$', '$'], ['\\(', '\\)']], 
                                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                                processEscapes: true,
                                processEnvironments: true,
                                tags: 'ams'
                            },
                            options: { 
                                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                                ignoreHtmlClass: 'no-mathjax'
                            },
                            startup: {
                                pageReady: () => {
                                    return MathJax.startup.defaultPageReady().then(() => {
                                        DEPS.mathjax.ready = true;
                                        resolve();
                                    });
                                }
                            }
                        };
                    });
                    return importScript('https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js', 'mathjax-js')
                        .then(() => DEPS.mathjax.readyPromise);
                }
            },
            marked: {
                load: () => importScript('https://cdn.jsdelivr.net/npm/marked/marked.min.js', 'marked-js')
            },
            chartjs: {
                load: () => importScript('https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js', 'chart-js')
            },
            mermaid: {
                ready: false,
                load: async () => {
                    await importScript('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js', 'mermaid-js');
                    if (window.mermaid) {
                        mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'strict' });
                        DEPS.mermaid.ready = true;
                    }
                }
            }
        };

        function importScript(src, id) {
            return new Promise((resolve, reject) => {
                if (document.getElementById(id)) return resolve();
                const script = document.createElement('script');
                script.id = id;
                script.src = src;
                script.async = true;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        // Initialize Mermaid (deferred)
        // mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });

        // ── State ───────────────────────────────────
        const params = new URLSearchParams(window.location.search);
        const paperId = params.get('id');
        const subjectCode = params.get('subject');
        const year = parseInt(params.get('year'));
        const examType = params.get('exam');

        let totalQuestions = 0;
        let answeredCount = 0;
        let globalPaper = null;
        let globalQuestions = [];
        let studyOpenPersisted = false;

        function hasDirectPaperLookup() {
            return !!paperId;
        }

        function hasCompositePaperLookup() {
            return !!subjectCode && Number.isFinite(year) && !!examType;
        }

        function showPaperError(message) {
            // Forward to global system
            if (window.handleApiError) {
                window.handleApiError(new Error(message), 'Access Denied or Connection Lost');
            }

            const skeleton = document.getElementById('paperLoadingSkeleton');
            const titleBlock = document.getElementById('paperTitleBlock');
            const errorState = document.getElementById('errorState');
            const errorMsg = document.getElementById('errorMsg');
            const questionsContainer = document.getElementById('questionsContainer');
            const progressWrap = document.getElementById('progressWrap');
            const doneBanner = document.getElementById('doneBanner');
            const downloadBtn = document.getElementById('downloadBtn');
            const downloadBtnMobile = document.getElementById('downloadBtnMobile');

            if (skeleton) skeleton.style.display = 'none';
            if (titleBlock) titleBlock.classList.add('hidden');
            if (questionsContainer) questionsContainer.classList.add('hidden');
            if (doneBanner) doneBanner.classList.add('hidden');

            if (progressWrap) {
                progressWrap.style.display = 'none';
                progressWrap.style.opacity = '1';
            }

            if (downloadBtn) downloadBtn.style.display = 'none';

            if (errorState) errorState.classList.remove('hidden');
            if (errorMsg) errorMsg.textContent = String(message || 'Something went wrong while loading the paper.');
        }

        async function handleDownload() {
            // Placeholder for original handleDownload logic

            console.log('Download triggered');

        const setupDownloadBtn = () => {
            const btn = document.getElementById('downloadBtn');
            btn?.addEventListener('click', async () => {
                btn.disabled = true;

        function hidePaperError() {
            const errorState = document.getElementById('errorState');
            const errorMsg = document.getElementById('errorMsg');

            if (errorState) errorState.classList.add('hidden');
            if (errorMsg) errorMsg.textContent = '';

        // ── Load Paper ───────────────────────────────
        async function getSignedInUserId() {
          const { data, error } = await supabase.auth.getSession();
          if (error) throw error;
          return data?.session?.user?.id || null;
        }

        async function savePaperStudyOpen(paper) {
          if (!paper || studyOpenPersisted) return;

          try {
            await ensureSubjectTracked({
                subjectCode: paper.subject_code,
                subjectName: paper.subject_name
            });
            studyOpenPersisted = true;
          } catch (error) {
            console.error('Failed to save paper study progress:', error);
          }
        }

        async function loadPaper() {
            console.log('[Paper-View] loadPaper started');
            try {
                // Parallel: dependencies + paper query
                hidePaperError();

                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('Paper request timed out after 10 seconds.')), 10000)
                );

                let query = supabase
                    .from('past_papers')
                    .select('*');

                if (hasDirectPaperLookup()) {
                    query = query.eq('id', paperId);
                } else if (hasCompositePaperLookup()) {
                    query = query
                        .eq('subject_code', subjectCode)
                        .eq('year', year)
                        .eq('exam_type', examType);
                } else {
                    throw new Error('Missing paper identifier in URL.');
                }

                const container = document.getElementById('questionsContainer');
                if (container) container.setAttribute('aria-busy', 'true');

                const paperResult = await Promise.race([query.maybeSingle(), timeoutPromise]);
                const { data: paper, error: paperError } = paperResult;

                if (paperError) throw paperError;
                if (!paper) throw new Error('Paper not found.');

                globalPaper = paper;
                savePaperStudyOpen(paper);

                // Sync UI
                const fullTitle = `${paper.subject_name} — ${paper.exam_type} ${paper.year}`;
                document.title = `${fullTitle} | COMSATSPrepHub`;
                document.getElementById('paperTitle').textContent = fullTitle;
                if (document.getElementById('navPaperTitle')) {
                    document.getElementById('navPaperTitle').textContent = fullTitle;
                }
                document.getElementById('quickMarks').textContent = paper.total_marks || '—';

                // Render Header Metadata
                const chips = [
                    ['school', paper.subject_code],
                    ['person', paper.instructor_name || '—'],
                    ['calendar_today', `${paper.semester || ''} ${paper.year}`.trim()],
                    ['assignment', paper.exam_type],
                ];
                document.getElementById('paperChips').innerHTML = chips.map(([icon, label]) => `
                    <span class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-100 dark:bg-white/5 border border-slate-200/50 dark:border-white/10 rounded-full text-xs font-bold text-slate-600 dark:text-slate-400 shadow-sm transition-all hover:bg-white dark:hover:bg-white/10">
                        <span class="material-symbols-outlined text-[14px] text-slate-400 dark:text-slate-500 font-variation-light">${icon}</span>${label}
                    </span>
                `).join('');

                // Sidebar meta
                const meta = [
                    ['school', 'Subject', paper.subject_name],
                    ['tag', 'Code', paper.subject_code],
                    ['person', 'Instructor', paper.instructor_name || '—'],
                    ['calendar_today', 'Year', paper.year],
                    ['assignment', 'Exam', paper.exam_type],
                    ['auto_stories', 'Semester', paper.semester || '—'],
                    ['grade', 'Total Marks', paper.total_marks],
                ];
                document.getElementById('sidebarMeta').innerHTML = meta.map(([icon, label, val]) => `
                    <div class="flex items-start gap-2.5">
                        <span class="material-symbols-outlined text-[16px] text-slate-400 mt-0.5 flex-shrink-0">${icon}</span>
                        <div class="min-w-0">
                            <p class="text-[10px] uppercase tracking-wider font-bold text-slate-400">${label}</p>
                            <p class="text-sm font-semibold text-slate-800 truncate">${val}</p>
                        </div>
                    </div>
                `).join('');

                // Fetch Questions
                const { data: questions, error: qError } = await supabase
                    .from('questions')
                    .select('*')
                    .eq('paper_id', paper.id)
                    .order('question_number', { ascending: true });

                if (qError) throw qError;
                if (!questions || questions.length === 0) throw new Error('No questions found.');

                globalQuestions = questions;
                totalQuestions = questions.length;
                
                document.getElementById('progressWrap').style.display = '';
                updateProgress();
                await renderQuestions(questions);

            } catch (err) {
                console.error('[Paper-View] Load error:', err);
                showPaperError(err.message || 'Connection failed.');
            } finally {
                hidePaperSkeleton();
                const qContainer = document.getElementById('questionsContainer');
                if (qContainer) qContainer.setAttribute('aria-busy', 'false');
            }
        }

        // ── Format Markdown ───────────────────────────
        // ── SUPER AGGRESSIVE REPAIR for smashed ChatGPT model answers ──
        function normalizeModelAnswer(text) {
            if (!text || typeof text !== 'string') return '';

            let fixed = text;

            // 1. Fix common word-sticking patterns (Letu → Let u, Differentiatebothsides → Differentiate both sides)
            fixed = fixed.replace(/Letu/g, 'Let u');
            fixed = fixed.replace(/so\(tan/g, 'so tan');
            fixed = fixed.replace(/Differentiatebothsidesw\.r\.t\.x/g, 'Differentiate both sides w.r.t. x');
            fixed = fixed.replace(/fracdu dx/g, '\\frac{du}{dx}');
            fixed = fixed.replace(/fracdy dx/g, '\\frac{dy}{dx}');
            fixed = fixed.replace(/fracd([a-z])/g, '\\frac{d$1}');

            // 2. Add spaces around math symbols and commands
            fixed = fixed.replace(/([=+\-*/^()])/g, ' $1 ');
            fixed = fixed.replace(/\s+/g, ' ');           // normalize multiple spaces

            // 3. Force newlines before typical solution steps
            fixed = fixed.replace(/(Let |Differentiate |so |Then |Thus |Now |Where |Therefore )/gi, '\n\n$1');
            fixed = fixed.replace(/(\$\s*[^$]+?)\s*([=])\s*/g, '\n\n$1 $2 ');

            // 4. Auto-wrap any equation-like line that doesn’t already have $
            const lines = fixed.split('\n');
            const cleanedLines = lines.map(line => {
                const trimmed = line.trim();
                if (!trimmed) return '';

                // If it looks like math and doesn’t start with $
                if ((trimmed.includes('=') || trimmed.includes('^') || trimmed.includes('y\'') || 
                     trimmed.includes('\\tan') || trimmed.includes('\\sec') || trimmed.includes('\\frac')) &&
                    !trimmed.startsWith('$') && !trimmed.startsWith('$$')) {
                    
                    return '$' + trimmed + '$';
                }
                return trimmed;
            });

            return cleanedLines.join('\n\n');
        }

        // ══════════════════════════════════════════════
        //  SAFE Markdown + MathJax rendering (FINAL VERSION)
        // ══════════════════════════════════════════════
        function formatMarkdown(text) {
            if (!text || typeof text !== 'string') return '';
            
            // 🔸 Split step headers onto their own paragraph
            let processed = text
                .replace(/\n(?!\n)/g, '\n\n')                                // single \n → \n\n
                .replace(/(Step\s*\d+[:.])/gi, '\n\n---\n\n**$1**\n\n')       // Add separator + bold Step
                .replace(/(Left-hand derivative:|Right-hand derivative:|Conclusion:|Claim:|Counter-Example:)/gi, '\n\n**$1**\n\n');

            processed = processed.includes('Letu') || processed.includes('Differentiatebothsides') ? normalizeModelAnswer(processed) : processed;

            const mathBlocks = [];
            let counter = 0;

            // Extract all math blocks
            processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, match => { mathBlocks.push(match); return `%%MATH_BLOCK_${counter++}%%`; });
            processed = processed.replace(/\\\[([\s\S]*?)\\\]/g, match => { 
                mathBlocks.push('$$' + match.slice(2, -2) + '$$'); return `%%MATH_BLOCK_${counter++}%%`; 
            });
            processed = processed.replace(/\$(.+?)\$/g, match => { mathBlocks.push(match); return `%%MATH_BLOCK_${counter++}%%`; });
            processed = processed.replace(/\\\(([\s\S]*?)\\\)/g, match => { 
                mathBlocks.push('$' + match.slice(2, -2) + '$'); return `%%MATH_BLOCK_${counter++}%%`; 
            });

            // Run marked.js
            const html = marked.parse(processed, { breaks: true, gfm: true });

            // Restore math
            let result = html;
            for (let i = 0; i < mathBlocks.length; i++) {
                result = result.replace(`%%MATH_BLOCK_${i}%%`, mathBlocks[i]);
            }

            return sanitizeHtml(result);
        }

        // ── Graph/Chart Rendering ─────────────────────
        function renderGraph(graphData, containerId) {
            if (!graphData || !graphData.type) return '';

            if (graphData.type === 'mermaid') {
                return `<div class="my-6 flex justify-center"><div class="mermaid" id="${containerId}">${escapeHtml(graphData.code || '')}</div></div>`;
            }

            const colors = [
                'rgba(59,130,246,0.8)', 'rgba(99,102,241,0.8)',
                'rgba(168,85,247,0.8)', 'rgba(236,72,153,0.8)',
                'rgba(245,158,11,0.8)', 'rgba(16,185,129,0.8)'
            ];
            const borderColors = colors.map(c => c.replace('0.8', '1'));

            const isScatter = graphData.type === 'scatter';

            const datasets = (graphData.datasets || []).map((ds, i) => ({
                ...ds,
                backgroundColor: ds.backgroundColor || (graphData.type === 'pie' || graphData.type === 'doughnut' ? colors : colors[i % colors.length]),
                borderColor: ds.borderColor || (graphData.type === 'pie' || graphData.type === 'doughnut' ? borderColors : borderColors[i % borderColors.length]),
                borderWidth: ds.borderWidth || (isScatter ? 2.5 : 2),
                tension: ds.tension || 0.3,
                showLine: isScatter ? (ds.showLine !== false) : undefined,
                pointRadius: isScatter ? (ds.pointRadius ?? 2) : undefined,
                fill: ds.fill ?? false,
            }));

            const chartConfig = {
                type: graphData.type,
                data: { labels: graphData.labels || [], datasets },
                _isFunction: isScatter,
                _xMin: graphData.xMin ?? null, _xMax: graphData.xMax ?? null,
                _yMin: graphData.yMin ?? null, _yMax: graphData.yMax ?? null,
            };

            return `
                <div class="chart-container my-6 bg-white border border-slate-200 rounded-2xl p-5 shadow-sm max-w-2xl mx-auto">
                    ${graphData.title ? `<div class="text-center font-bold text-slate-700 mb-4 text-sm">${graphData.title}</div>` : ''}
                    <canvas id="${containerId}" 
                        data-chart='${JSON.stringify(chartConfig).replace(/'/g, "&#39;")}'
                        style="max-height: 400px;">
                    </canvas>
                </div>`;
        }

        function initializeCharts() {
            const isDark = document.documentElement.classList.contains('dark');
            document.querySelectorAll('canvas[data-chart]').forEach(canvas => {
                if (canvas.dataset.chartInit === '1') return; // skip already drawn
                try {
                    const config = JSON.parse(canvas.getAttribute('data-chart'));
                    
                    // Theme-aware defaults
                    if (window.Chart) {
                        Chart.defaults.color = isDark ? '#94a3b8' : '#64748b';
                    }
                    
                    if (config.type === 'scatter' || config._isFunction) {
                        config.data.datasets.forEach(ds => {
                            if (ds.showLine !== false) ds.showLine = true;
                            ds.pointRadius = ds.pointRadius ?? 2;
                            ds.borderWidth = ds.borderWidth ?? 2.5;
                        });
                        config.options = {
                            scales: {
                                x: { 
                                    type: 'linear', position: 'center', 
                                    min: config._xMin ?? undefined, max: config._xMax ?? undefined, 
                                    grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } 
                                },
                                y: { 
                                    type: 'linear', position: 'center', 
                                    min: config._yMin ?? undefined, max: config._yMax ?? undefined, 
                                    grid: { color: isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)' } 
                                }
                            }
                        };
                        delete config._xMin; delete config._xMax; delete config._yMin; delete config._yMax; delete config._isFunction;
                    }
                    config.options = config.options || {};
                    config.options.responsive = true;
                    config.options.plugins = config.options.plugins || { legend: { position: 'bottom' } };
                    new Chart(canvas, config);
                    canvas.dataset.chartInit = '1';
                } catch (e) {
                    logger.error('Chart init error', e);
                }
            });
        }

        async function initializeMermaidDiagrams() {
            const mEls = document.querySelectorAll('.mermaid');
            if (mEls.length > 0) {
                try { await mermaid.run({ nodes: mEls }); }
                catch (e) { logger.error('Mermaid render failed', e); }
            }
        }

        // ── Render Questions ──────────────────────────

                            </div>

                    <div id="model-${q.id}" class="hidden px-6 sm:px-8 pb-6 sm:pb-8 transition-all scroll-mt-28">

                            <div class="flex items-center gap-2 mb-4">
                                <span class="material-symbols-outlined text-emerald-600 dark:text-emerald-400">auto_awesome</span>
                                <span class="font-black text-[11px] text-emerald-700 dark:text-emerald-300 uppercase tracking-widest">Model Answer</span>
                            </div>
                            <div class="solution-prose question-prose prose dark:prose-invert max-w-none text-[15.5px] leading-loose space-y-3 text-slate-800 dark:text-gray-200">

            requestAnimationFrame(async () => {
                if (hasCharts && window.Chart) initializeCharts();
                if (hasMermaid && DEPS.mermaid.ready) await initializeMermaidDiagrams();
                if (hasMath && window.MathJax?.typesetPromise) {
                    try {
                        // Ensure we are truly ready before typesetting
                        if (DEPS.mathjax.readyPromise) await DEPS.mathjax.readyPromise;
                        await MathJax.typesetPromise([container]);
                    } catch (err) {
                        logger.error('MathJax render failed', err);
                    }
                }
                if (typeof autoHideProgressBar === 'function') autoHideProgressBar();

        // ── Submit Answer ─────────────────────────────
        window.submitAnswer = function (qId) {
            const btn = document.getElementById(`btn-${qId}`);
            const textarea = document.getElementById(`answer-${qId}`);
            const model = document.getElementById(`model-${qId}`);
            const badge = document.getElementById(`status-badge-${qId}`);
            const dot = document.getElementById(`qnav-dot-${qId}`);

            // Update button state
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined text-[16px] animate-spin">progress_activity</span> Revealing…`;
            btn.className = btn.className.replace('bg-brand-600 hover:bg-brand-700', 'bg-slate-200 text-slate-500 cursor-default');

            // Update textarea
            textarea.readOnly = true;
            textarea.className += ' opacity-60 cursor-not-allowed bg-white';

            // Show answer
            setTimeout(() => {
                model.classList.remove('hidden');
                badge.classList.remove('hidden');
                if (dot) { dot.classList.remove('bg-slate-200'); dot.classList.add('bg-teal-500'); }
                btn.innerHTML = `<span class="material-symbols-outlined text-[16px]">check_circle</span> Submitted`;

                // Trigger MathJax on newly visible model answer
                if (window.MathJax?.typesetPromise) {
                    // Clear prior typeset in this subtree to ensure fresh render
                    if (MathJax.typesetClear) MathJax.typesetClear([model]);
                    MathJax.typesetPromise([model]).catch(err => logger.error('MathJax model render failed', err));
                }

                // Initialize any answer-graph canvases that haven't been drawn yet
                if (window.Chart) initializeCharts();

                // Render any mermaid inside the panel
                if (window.mermaid) {
                    model.querySelectorAll('.mermaid:not([data-processed])').forEach(() => mermaid.run({ nodes: model.querySelectorAll('.mermaid') }));
                }

                // Smooth scroll to the revealed model answer
                requestAnimationFrame(() => {
                    model.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start',
                        inline: 'nearest'
                    });
                });
            }, 350);

            // Progress
            answeredCount++;
            updateProgress();
            
            // TRACK MASTERY: Reveal answer = learning
            trackMastery();

            if (answeredCount === totalQuestions) {
                setTimeout(() => {
                    const done = document.getElementById('doneBanner');
                    done.classList.remove('hidden');
                    done.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 600);
            }
        };

        // ── Progress ──────────────────────────────────
        function updateProgress() {
            const pct = totalQuestions > 0 ? Math.round((answeredCount / totalQuestions) * 100) : 0;
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            const ariaBar = document.getElementById('progressAccessibility');
            
            if (fill) fill.style.width = pct + '%';
            if (text) text.textContent = `${answeredCount} / ${totalQuestions}`;
            if (ariaBar) ariaBar.setAttribute('aria-valuenow', pct);
        }

        let pendingMastery = 0;
        let masterySyncTimer = null;

        function trackMastery() {
            pendingMastery += 2;
            
            if (masterySyncTimer) clearTimeout(masterySyncTimer);
            masterySyncTimer = setTimeout(flushMastery, 2500);
        }

        async function flushMastery() {
            if (pendingMastery === 0 || !globalPaper) return;
            
            const delta = pendingMastery;
            pendingMastery = 0; // reset early to avoid double counting during await
            
            try {
                await addSubjectMastery({
                    subjectCode: globalPaper.subject_code,
                    subjectName: globalPaper.subject_name,
                    delta: delta
                });
            } catch (err) {
                console.warn('Mastery tracking failed, requeuing:', err);
                pendingMastery += delta; // re-queue failed attempts
            }
        }
        
        // Ensure any pending mastery is saved safely when leaving
        window.addEventListener('beforeunload', () => {
            if (pendingMastery > 0) flushMastery();
        });

        const formatContentAsync = async (text) => {
            if (!text) return '';

            // Fix literal '\n' which might be present in db entries
            let processed = text.replace(/\\n/g, '\n');

            // Extract math blocks to avoid Markdown parser messing them up
            const blockRegex = /\\\[([\s\S]*?)\\\]/g;
            const inlineRegex = /\\\(([\s\S]*?)\\\)/g;

            let mathBlocks = [];

            processed = processed.replace(blockRegex, (_, eq) => {
                let id = mathBlocks.length;
                mathBlocks.push({ eq: eq.trim(), display: true });
                return `__MATH_${id}__`;
            });

            processed = processed.replace(inlineRegex, (_, eq) => {
                let id = mathBlocks.length;
                mathBlocks.push({ eq: eq.trim(), display: false });
                return `__MATH_${id}__`;
            });

            // Parse markdown to HTML using marked.js
            let html = marked.parse(processed);

            // Re-insert math as MathML which MS Word natively converts to Equations!
            for (let i = 0; i < mathBlocks.length; i++) {
                let mml = '';
                try {
                    if (window.MathJax) {
                        if (MathJax.tex2mmlPromise) {
                            mml = await MathJax.tex2mmlPromise(mathBlocks[i].eq, { display: mathBlocks[i].display });
                        } else if (MathJax.tex2mml) {
                            mml = MathJax.tex2mml(mathBlocks[i].eq, { display: mathBlocks[i].display });
                        } else {
                            mml = escapeHtml('\\(' + mathBlocks[i].eq + '\\)');
                        }

                        // Ensure xmlns is present so Word recognizes it as MathML
                        if (mml.startsWith('<math') && !mml.includes('xmlns=')) {
                            mml = mml.replace('<math', '<math xmlns="http://www.w3.org/1998/Math/MathML"');
                        }
                    } else {
                        mml = escapeHtml('\\(' + mathBlocks[i].eq + '\\)');
                    }
                } catch (err) {
                    mml = escapeHtml('\\(' + mathBlocks[i].eq + '\\)');
                }
                html = html.replace(`__MATH_${i}__`, mml);
            }

            // Inject inline CSS so MS Word renders tables and code blocks correctly
            html = html.replace(/<table/g, '<table border="1" cellpadding="8" style="border-collapse: collapse; width: 100%; margin: 15px 0; border: 1px solid #cbd5e1;"');
            html = html.replace(/<th([^>]*)>/g, '<th$1 style="background-color: #f8fafc; font-weight: bold; text-align: left; border: 1px solid #cbd5e1;">');
            html = html.replace(/<td([^>]*)>/g, '<td$1 style="border: 1px solid #cbd5e1;">');
            html = html.replace(/<ul/g, '<ul style="margin-left: 20px;"');
            html = html.replace(/<ol/g, '<ol style="margin-left: 20px;"');
            html = html.replace(/<li/g, '<li style="margin-bottom: 5px;"');
            html = html.replace(/<pre><code/g, '<pre style="background-color: #f1f5f9; padding: 12px; border: 1px solid #e2e8f0; font-family: Consolas, monospace; white-space: pre-wrap;"><code');

            return html;
        };

        function showDownloadStatus(type, message) {
            const wrap = document.getElementById('downloadStatus');
            const inner = document.getElementById('downloadStatusInner');
            if (!wrap || !inner) return;

            const styles = {
                success: 'bg-emerald-50 text-emerald-800 border-emerald-200',
                error: 'bg-red-50 text-red-800 border-red-200',
                info: 'bg-blue-50 text-blue-800 border-blue-200'
            };

            wrap.classList.remove('hidden');
            wrap.style.display = 'block';

            inner.className = 'rounded-xl border px-4 py-3 text-sm leading-relaxed transition-all';
            inner.classList.add(...(styles[type] || styles.info).split(' '));
            inner.textContent = String(message || '');

            window.clearTimeout(window.__paperDownloadStatusTimer);
            window.__paperDownloadStatusTimer = window.setTimeout(() => {
                hideDownloadStatus();
            }, 4000);
        }

        function hideDownloadStatus() {
            const wrap = document.getElementById('downloadStatus');
            const inner = document.getElementById('downloadStatusInner');
            if (!wrap || !inner) return;

            wrap.classList.add('hidden');
            wrap.style.display = 'none';
            inner.textContent = '';
        }

        // ── Download as Word ──────────────────────────
        window.handleDownload = async function () {
            const desktopBtn = document.getElementById('downloadBtn');
            const mobileBtn = document.getElementById('downloadBtnMobile');

            if (!globalPaper || !globalQuestions || !globalQuestions.length) {
                showDownloadStatus('error', 'Paper content is not ready for export yet.');

            }

            const originalDesktopHtml = desktopBtn ? desktopBtn.innerHTML : '';
            const originalMobileHtml = mobileBtn ? mobileBtn.innerHTML : '';

            const setBusy = (busy) => {
                if (desktopBtn) {
                    desktopBtn.disabled = busy;
                    desktopBtn.innerHTML = busy
                        ? `<span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span><span>Preparing...</span>`
                        : originalDesktopHtml;
                }

                if (mobileBtn) {
                    mobileBtn.disabled = busy;
                    mobileBtn.innerHTML = busy
                        ? `<span class="material-symbols-outlined text-[20px] animate-spin">progress_activity</span>`
                        : originalMobileHtml;
                }
            };

            try {
                setBusy(true);
                hideDownloadStatus();
                showDownloadStatus('info', 'Preparing your Word export...');

                let html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>${escapeHtml(globalPaper.subject_name)} ${escapeHtml(globalPaper.exam_type)} ${globalPaper.year}</title>

<` + `/style>
<` + `/head>
<body>
<div class="paper-head">
<h1>${escapeHtml(globalPaper.subject_name)}</h1>
<h3>${escapeHtml(globalPaper.exam_type)} ${globalPaper.year}</h3>
<p><b>Instructor:</b> ${escapeHtml(globalPaper.instructor_name || '—')} &nbsp;|&nbsp; <b>Code:</b> ${escapeHtml(globalPaper.subject_code)} &nbsp;|&nbsp; <b>Total Marks:</b> ${globalPaper.total_marks}</p>
</div>`;


                for (const q of globalQuestions) {
                    const qText = await formatContentAsync(q.question_text);
                    const mAns = await formatContentAsync(q.model_answer);

                    html += `<div class="q-box">
                        <p class="q-meta">Q${q.question_number}. ${q.clo ? `(${escapeHtml(q.clo)})` : ''} [${q.marks} Marks]</p>
                        ${qText}
                        <div class="model-ans"><p style="margin-top:0"><b>Model Answer:</b></p>
                        ${mAns ? mAns : '<p><i>No model answer provided.</i></p>'}</div>
                    </div>`;
                }

                html += '<' + '/body><' + '/html>';

                const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');

                link.href = url;
                link.download = `${globalPaper.subject_code}_${globalPaper.exam_type.replace(/\s+/g, '')}_${globalPaper.year}.doc`;

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);

                showDownloadStatus('success', 'Word export started successfully.');
            } catch (err) {
                showDownloadStatus('error', `Could not start download: ${err?.message || 'Unknown error'}`);
            } finally {
                setBusy(false);
            }
        };

        // ── Boot ─────────────────────────────────────
        loadPaper();
    </script>
    <script>
        // Hide skeleton when paper finishes loading
        function hidePaperSkeleton() {
            const skeleton = document.getElementById('paperLoadingSkeleton');
            const content = document.getElementById('paperTitleBlock');

            if (skeleton && content) {
                skeleton.style.transition = 'opacity 0.3s ease';
                skeleton.style.opacity = '0';

                setTimeout(() => {
                    skeleton.style.display = 'none';
                    content.classList.remove('hidden');
                    content.style.opacity = '0';
                    content.style.transition = 'opacity 0.4s ease';

                    setTimeout(() => {
                        content.style.opacity = '1';
                    }, 50);
                }, 300);
            }
        }

        // Auto hide progress bar after 3 seconds
        function autoHideProgressBar() {
            const progressWrap = document.getElementById('progressWrap');

            if (progressWrap) {
                setTimeout(() => {
                    progressWrap.style.transition = 'opacity 0.6s ease';
                    progressWrap.style.opacity = '0';

                    setTimeout(() => {
                        progressWrap.style.display = 'none';
                    }, 600);
                }, 3000); // Hides after 3 seconds
            }
        }
    </script>
    <script>
        let lastScrollTop = 0;
        const header = document.querySelector('header');

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY || document.documentElement.scrollTop;

            // Only act if there is a real change in scroll position
            if (Math.abs(scrollTop - lastScrollTop) <= 5) return;

            if (scrollTop > lastScrollTop && scrollTop > 80) {
                // Scrolling down → hide header
                header.classList.add('header-hidden');
            } else if (scrollTop < lastScrollTop) {
                // Scrolling up → show header
                header.classList.remove('header-hidden');
            }

            lastScrollTop = scrollTop;
        });
    </script>
</body>

</html>
