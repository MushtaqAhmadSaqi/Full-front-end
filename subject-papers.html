<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Subject Papers | COMSATSPrepHub</title>
    <meta name="description" content="Browse past papers organized by year and exam type.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <!-- Use built CSS instead -->
    <link rel="stylesheet" href="styles/tailwind-built.css">
    <link rel="stylesheet" href="style.css">

    <script src="js/dark-mode.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    
    <style>
      /* Prevent horizontal scroll and ensure stability */
      html, body {
        overflow-x: hidden;
        width: 100%;
        position: relative;
      }
      
      main {
        overflow-x: hidden;
      }

      /* Hide scrollbar for stats row but allow swiping */
      #statsRow::-webkit-scrollbar {
        display: none;
      }
      #statsRow {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      #subjectTitle {
        line-height: 1.2;
        word-break: break-word;
      }
    </style>
</head>

<body class="bg-[#f0f2f5] dark:bg-[#0f172a] text-[#1a1a2e] dark:text-gray-100 transition-colors duration-300 antialiased min-h-screen">
    
    <div id="app-header"></div>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-10 page-transition">
        
        <!-- Header Section -->
        <div class="mb-8">
            <!-- Back Button -->
            <a href="subjects.html" 
               class="nav-link-premium inline-flex items-center gap-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-primary dark:hover:text-primary mb-4 transition-colors">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                <span class="hidden sm:inline">Back to Subjects</span>
                <span class="sm:hidden font-bold">Back</span>
            </a>

            <!-- Subject Header -->
            <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6">
                <div class="min-w-0 flex-1">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-primary to-accent flex items-center justify-center shadow-sm flex-shrink-0">
                            <span class="text-white text-xl font-bold" id="subjectIcon">📘</span>
                        </div>
                        <div class="min-w-0 flex-1 uppercase tracking-tighter">
                            <h1 class="text-2xl sm:text-3xl font-black tracking-tight text-slate-900 dark:text-white truncate" id="subjectTitle">Loading...</h1>
                            <p class="text-[10px] font-bold text-gray-400 dark:text-gray-500 tracking-widest truncate" id="subjectCode"></p>
                        </div>
                    </div>
                </div>

                <!-- Stats Row (Horizontally scrollable on mobile) -->
                <div id="statsRow" class="flex items-center gap-2 overflow-x-auto pb-1 -mx-1 px-1 sm:pb-0 sm:mx-0 sm:px-0 min-h-[58px] opacity-60" aria-live="polite">
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">📄</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Papers</div>
                            <div class="font-bold text-sm" id="statPapers">0</div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">📝</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Questions</div>
                            <div class="font-bold text-sm" id="statQuestions">0</div>
                        </div>
                    </div>
                    <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl px-3 py-1.5 flex items-center gap-2 shadow-sm flex-shrink-0">
                        <span class="text-base">🗓️</span>
                        <div>
                            <div class="text-[10px] uppercase font-bold text-gray-400">Years</div>
                            <div class="font-bold text-sm" id="statYears">—</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Error Banner -->
        <div id="errorBanner" class="hidden mb-6 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 px-4 py-3 rounded-2xl flex items-start gap-3">
            <span class="material-symbols-outlined mt-0.5">error</span>
            <div id="errorMessage"></div>
        </div>

        <!-- Loading Skeleton -->
        <div id="loadingSkeleton" class="space-y-6">
            <div class="space-y-3">
                <div class="h-6 w-32 bg-gray-200 dark:bg-white/10 rounded-full animate-pulse"></div>
                <div class="h-20 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl animate-pulse"></div>
                <div class="h-20 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl animate-pulse"></div>
            </div>
        </div>

        <!-- Papers Container -->
        <div id="papersContainer" class="hidden space-y-8"></div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-16">
            <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-gray-100 dark:bg-white/10 flex items-center justify-center">
                <span class="text-5xl">📂</span>
            </div>
            <h3 class="text-2xl font-bold mb-2 text-slate-800 dark:text-white">No papers found</h3>
            <p class="text-gray-500 dark:text-gray-400 max-w-sm mx-auto">
                No past papers have been uploaded for this subject yet.
            </p>
        </div>

    </main>

    <div id="app-footer"></div>
    <div id="app-mobile-nav"></div>

    <script type="module">
  import { supabase, escapeHtml as escHtml } from './utils.js';
  import { ensureSubjectTracked } from './js/progress-service.js';

  const params = new URLSearchParams(window.location.search);
  const subjectName = params.get('subject') || '';
  const subjectCode = params.get('code') || '';

  const titleEl = document.getElementById('subjectTitle');
  const codeEl = document.getElementById('subjectCode');
  const iconEl = document.getElementById('subjectIcon');

  if (titleEl) titleEl.textContent = subjectName || subjectCode || 'Unknown Subject';
  if (codeEl) codeEl.textContent = subjectCode ? `Code: ${subjectCode}` : '';
  document.title = `${subjectName || subjectCode || 'Subject'} — Papers | COMSATSPrepHub`;

  const subjectIcons = {
    'Data Structures': '💻',
    'Operating Systems': '🖥️',
    'Calculus': '📐',
    'Linear Algebra': '📊',
    'Web Technologies': '🌐'
  };

  if (iconEl) iconEl.textContent = subjectIcons[subjectName] || '📘';

  function showInlineError(message) {
    const loadingEl = document.getElementById('loadingSkeleton');
    const errorBanner = document.getElementById('errorBanner');
    const errorMessage = document.getElementById('errorMessage');
    const papersContainer = document.getElementById('papersContainer');

    loadingEl?.classList.add('hidden');
    papersContainer?.classList.add('hidden');

    if (window.handleApiError) {
      window.handleApiError(new Error(message), 'Failed to load papers');
    }

    if (errorBanner && errorMessage) {
      errorBanner.classList.remove('hidden');
      errorMessage.innerHTML = `
        <strong>Failed to load papers</strong><br>
        <span class="text-sm">${escHtml(message || 'Unknown error')}</span>
      `;
    }
  }

  function getExamBadgeClass(examType) {
    return String(examType || '').toLowerCase().includes('mid')
      ? 'bg-blue-100 text-blue-700 dark:bg-blue-500/20 dark:text-blue-400'
      : 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-400';
  }

  async function getQuestionCountsMap(paperIds = []) {
    if (!paperIds.length) return { totalQuestions: 0, questionCountMap: new Map() };

    const { data, error } = await supabase.from('questions').select('paper_id').in('paper_id', paperIds);
    if (error) {
       console.error("Failed fetching question counts:", error);
       return { totalQuestions: 0, questionCountMap: new Map() };
    }

    const questionCountMap = new Map();

    (data || []).forEach(row => {
      questionCountMap.set(row.paper_id, (questionCountMap.get(row.paper_id) || 0) + 1);
    });

    return {
      totalQuestions: (data || []).length,
      questionCountMap
    };
  }

  function renderPaperGroups(papers, questionCountMap) {
    const papersContainer = document.getElementById('papersContainer');
    if (!papersContainer) return;

    const grouped = new Map();

    papers.forEach(paper => {
      const yearKey = String(paper.year || 'Unknown');
      if (!grouped.has(yearKey)) grouped.set(yearKey, []);
      grouped.get(yearKey).push(paper);
    });

    const sortedYears = [...grouped.keys()].sort((a, b) => Number(b) - Number(a));

    papersContainer.innerHTML = sortedYears
      .map(year => {
        const yearPapers = grouped.get(year) || [];

        const cardsHtml = yearPapers.map(paper => {
          const examType = paper.exam_type || paper.type || 'Exam';
          const semester = paper.semester || 'Term not listed';
          const instructor = paper.instructor_name || paper.instructor || 'Instructor not listed';
          const totalMarks = paper.total_marks || '—';
          const questionCount = questionCountMap.get(paper.id) || 0;

          return `
            <a href="paper-view.html?id=${paper.id}"
               class="group block w-full bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 sm:p-6 transition-all duration-300 card-hover active:scale-[0.985]">
              <div class="flex items-start justify-between gap-4 mb-4">
                <div class="flex flex-wrap items-center gap-2">
                  <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${getExamBadgeClass(examType)}">
                    ${escHtml(examType)}
                  </span>
                  <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider bg-slate-100 text-slate-600 dark:bg-white/10 dark:text-slate-300">
                    ${escHtml(semester)}
                  </span>
                </div>
                <div class="text-right flex-shrink-0">
                  <div class="text-sm font-black text-slate-900 dark:text-white tabular-nums">${escHtml(year)}</div>
                  <div class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest leading-none">
                    ${questionCount} question${questionCount === 1 ? '' : 's'}
                  </div>
                </div>
              </div>

              <div class="mb-5 min-w-0">
                <h3 class="font-black text-[17px] sm:text-xl text-slate-900 dark:text-white mb-2 leading-snug break-words">
                  ${escHtml(examType)} ${escHtml(String(year))} Paper
                </h3>

                <p class="text-sm font-semibold text-slate-600 dark:text-slate-300">
                  Instructor: ${escHtml(instructor)}
                </p>
                <div class="flex flex-wrap items-center gap-x-3 gap-y-1 mt-3 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                  <span>${escHtml(subjectCode || subjectName || 'Subject')}</span>
                  <span>•</span>
                  <span>${escHtml(String(totalMarks))} marks</span>
                </div>
              </div>

              <div class="flex items-center justify-between pt-3 border-t border-slate-100 dark:border-white/5">
                <div class="flex items-center gap-1.5 text-primary-hover group-hover:gap-2.5 transition-all duration-300">
                  <span class="text-[11px] font-black uppercase tracking-wider">Open paper</span>
                  <span class="material-symbols-outlined text-base">arrow_forward</span>
                </div>
                <span class="material-symbols-outlined text-lg text-slate-300 dark:text-slate-700 group-hover:text-primary transition-colors">description</span>
              </div>
            </a>
          `;
        }).join('');

        return `
          <section class="animate-slide-up mb-10" aria-labelledby="year-${escHtml(year)}">
            <div class="flex items-center gap-3 mb-3">
              <div class="px-3 py-1 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-xl flex items-center gap-2 shadow-sm">
                <span class="material-symbols-outlined text-[18px] text-primary">calendar_today</span>
                <span id="year-${escHtml(year)}" class="font-black text-base text-slate-900 dark:text-white tabular-nums">${escHtml(year)}</span>
              </div>
              <div class="flex-1 h-px bg-slate-200 dark:bg-white/10"></div>
              <span class="text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">${yearPapers.length} papers</span>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              ${cardsHtml}
            </div>
          </section>
        `;
      })
      .join('');

    papersContainer.classList.remove('hidden');
  }

  async function loadPapers() {
    const loadingEl = document.getElementById('loadingSkeleton');
    const papersContainer = document.getElementById('papersContainer');
    const emptyState = document.getElementById('emptyState');

    if (!subjectName && !subjectCode) {
      showInlineError('No subject was selected. Please go back and choose a subject first.');
      return;
    }

    try {
      const timeoutPromise = new Promise((_, reject) => {
        window.setTimeout(() => reject(new Error('Request timed out after 10 seconds.')), 10000);
      });

      let query = supabase.from('past_papers').select('*').order('year', { ascending: false });

      if (subjectCode) {
        query = query.eq('subject_code', subjectCode);
      } else {
        query = query.eq('subject_name', subjectName);
      }

      const { data: papers, error } = await Promise.race([query, timeoutPromise]);
      if (error) throw error;

      loadingEl?.classList.add('hidden');

      if (!papers || !papers.length) {
        emptyState?.classList.remove('hidden');
        return;
      }

      const paperIds = papers.map(paper => paper.id).filter(Boolean);
      const { totalQuestions, questionCountMap } = await getQuestionCountsMap(paperIds);

      const years = [...new Set(papers.map(p => Number(p.year)).filter(Number.isFinite))];
      document.getElementById('statPapers').textContent = papers.length;
      document.getElementById('statQuestions').textContent = totalQuestions;
      document.getElementById('statYears').textContent = years.length > 1
        ? `${Math.min(...years)}–${Math.max(...years)}`
        : (years[0] || '—');
      document.getElementById('statsRow')?.classList.remove('opacity-60');

      renderPaperGroups(papers, questionCountMap);

      // Progress tracking should never block the papers list UI.
      try {
        await ensureSubjectTracked({
          subjectCode,
          subjectName: subjectName || subjectCode
        });
      } catch (error) {
        console.warn('Subject tracking failed:', error);
      }
    } catch (error) {
      showInlineError(error?.message || 'Something went wrong while loading papers.');
      papersContainer?.classList.add('hidden');
    }
  }

  loadPapers();
</script>

    <script type="module" src="js/layout.js"></script>
</body>
</html>
