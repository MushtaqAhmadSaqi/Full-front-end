<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects | COMSATSPrepHub</title>
    <meta name="description" content="Browse all COMSATS subjects and access past papers.">

    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&display=swap" rel="stylesheet">
    <!-- Use built CSS instead -->
    <link rel="stylesheet" href="styles/tailwind-built.css">
    <link rel="stylesheet" href="style.css">

    <script src="js/dark-mode.js" defer></script>
</head>

<body class="bg-[#f0f2f5] dark:bg-[#0f172a] text-[#1a1a2e] dark:text-gray-100 transition-colors duration-300 antialiased min-h-screen">

    <div id="app-header"></div>

    <main class="max-w-7xl mx-auto px-6 pt-10 pb-20 page-transition">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-8 mb-10">
            <div>
                <div class="inline-flex items-center px-3 py-1 rounded-full bg-brand-50 dark:bg-brand-500/10 border border-brand-100 dark:border-brand-500/20 text-brand-600 dark:text-brand-400 text-xs font-bold mb-3">
                    STUDY MATERIALS
                </div>
                <h1 class="text-4xl sm:text-5xl font-black tracking-tighter text-slate-900 dark:text-white leading-none">Academic Catalog</h1>
                <p class="mt-4 text-lg text-gray-600 dark:text-gray-400 max-w-md">
                    Explore past papers organized by subject.
                </p>
            </div>

            <!-- Search -->
            <div class="relative w-full md:w-96 group">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-brand-500 transition-colors">
                    <span class="material-symbols-outlined text-[24px]">search</span>
                </div>
                <label for="subjectSearchInput" class="sr-only">Search subjects</label>
                <input id="subjectSearchInput" type="search" inputmode="search" enterkeyhint="search" spellcheck="false" autocomplete="off" aria-describedby="subjectSearchStatus"
                       class="w-full pl-14 pr-5 py-4 bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-2xl text-lg placeholder:text-gray-400 focus:outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 transition-all shadow-sm"
                       placeholder="Search subjects...">
                <p id="subjectSearchStatus" class="sr-only" aria-live="polite"></p>
            </div>
        </div>

        <!-- Stats Badge -->
        <div id="subjectCountBadge" class="inline-flex items-center gap-2 px-4 py-1.5 bg-emerald-50 dark:bg-emerald-500/10 border border-emerald-100 dark:border-emerald-500/20 text-emerald-700 dark:text-emerald-400 text-sm font-bold rounded-2xl mb-8" style="display:none;">
            <span class="material-symbols-outlined text-lg">school</span>
            <span id="subjectCountText">0 Subjects</span>
        </div>

        <!-- Error -->
        <div id="errorBanner" class="hidden mb-8 bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-red-700 dark:text-red-400 px-5 py-4 rounded-2xl flex items-center gap-3">
            <span class="material-symbols-outlined">error</span>
            <div id="errorMessage"></div>
        </div>

        <!-- Loading Skeletons -->
        <div id="loadingGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 animate-pulse">
                <div class="w-11 h-11 bg-gray-200 dark:bg-white/10 rounded-2xl mb-4"></div>
                <div class="h-5 bg-gray-200 dark:bg-white/10 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-white/10 rounded w-1/2"></div>
            </div>
            <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 animate-pulse">
                <div class="w-11 h-11 bg-gray-200 dark:bg-white/10 rounded-2xl mb-4"></div>
                <div class="h-5 bg-gray-200 dark:bg-white/10 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-white/10 rounded w-1/2"></div>
            </div>
            <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 animate-pulse">
                <div class="w-11 h-11 bg-gray-200 dark:bg-white/10 rounded-2xl mb-4"></div>
                <div class="h-5 bg-gray-200 dark:bg-white/10 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-white/10 rounded w-1/2"></div>
            </div>
            <div class="bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 animate-pulse">
                <div class="w-11 h-11 bg-gray-200 dark:bg-white/10 rounded-2xl mb-4"></div>
                <div class="h-5 bg-gray-200 dark:bg-white/10 rounded w-3/4 mb-2"></div>
                <div class="h-3 bg-gray-200 dark:bg-white/10 rounded w-1/2"></div>
            </div>
        </div>

        <!-- Subjects Grid -->
        <div id="subjectsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" style="display:none;"></div>

        <!-- No Results -->
        <div id="noResults" class="hidden py-16 text-center">
            <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-gray-100 dark:bg-white/5 flex items-center justify-center">
                <span class="material-symbols-outlined text-5xl text-gray-400">search_off</span>
            </div>
            <h3 class="text-2xl font-bold mb-2">No subjects found</h3>
            <p class="text-gray-500 dark:text-gray-400">Try a different search term</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden py-16 text-center">
            <div class="w-20 h-20 mx-auto mb-6 rounded-3xl bg-brand-50 dark:bg-brand-500/10 flex items-center justify-center">
                <span class="material-symbols-outlined text-5xl text-brand-600">folder_off</span>
            </div>
            <h3 class="text-2xl font-bold mb-2">No subjects available</h3>
            <p class="text-gray-500 dark:text-gray-400 max-w-xs mx-auto">No past papers have been uploaded yet.</p>
        </div>

    </main>

    <div id="app-footer"></div>
    <div id="app-mobile-nav"></div>

    <script type="module">
  import { supabase, escapeHtml as escHtml } from './utils.js';

  const palette = [
    { bg: '#dbeafe', color: '#2563eb', icon: 'menu_book' },
    { bg: '#dcfce7', color: '#15803d', icon: 'database' },
    { bg: '#fef3c7', color: '#b45309', icon: 'function' },
    { bg: '#f3e8ff', color: '#7e22ce', icon: 'scatter_plot' },
    { bg: '#ccfbf1', color: '#0f766e', icon: 'terminal' },
    { bg: '#e0f2fe', color: '#0369a1', icon: 'code' },
    { bg: '#fce7f3', color: '#be185d', icon: 'psychology' },
    { bg: '#fee2e2', color: '#b91c1c', icon: 'science' }
  ];

  const ui = {
    loading: document.getElementById('loadingGrid'),
    grid: document.getElementById('subjectsGrid'),
    badge: document.getElementById('subjectCountBadge'),
    badgeText: document.getElementById('subjectCountText'),
    noResults: document.getElementById('noResults'),
    emptyState: document.getElementById('emptyState'),
    errorBanner: document.getElementById('errorBanner'),
    errorMessage: document.getElementById('errorMessage'),
    search: document.getElementById('subjectSearchInput'),
    searchStatus: document.getElementById('subjectSearchStatus')
  };

  function debounce(fn, delay = 150) {
    let timer = 0;
    return (...args) => {
      clearTimeout(timer);
      timer = window.setTimeout(() => fn(...args), delay);
    };
  }

  function resetUi() {
    ui.errorBanner?.classList.add('hidden');
    ui.noResults?.classList.add('hidden');
    ui.emptyState?.classList.add('hidden');
    if (ui.badge) ui.badge.style.display = 'none';
  }

  function showError(message) {
    ui.loading && (ui.loading.style.display = 'none');
    ui.grid && (ui.grid.style.display = 'none');

    if (window.handleApiError) {
      window.handleApiError(new Error(message), 'Failed to load subjects');
    }

    if (ui.errorBanner && ui.errorMessage) {
      ui.errorBanner.classList.remove('hidden');
      ui.errorBanner.style.display = 'flex';
      ui.errorMessage.innerHTML = `
        <strong>Failed to load subjects</strong><br>
        <span class="text-sm">${escHtml(message || 'Unknown error')}</span>
      `;
    }
  }

  function buildSubjects(rows = []) {
    const subjectMap = new Map();

    rows.forEach(row => {
      const subjectName = String(row.subject_name || 'Untitled Subject').trim();
      const subjectCode = String(row.subject_code || '').trim();
      const key = subjectCode || subjectName;
      const year = Number(row.year || 0);

      if (!subjectMap.has(key)) {
        subjectMap.set(key, {
          subject_name: subjectName,
          subject_code: subjectCode,
          count: 0,
          latestYear: 0,
          searchText: `${subjectName} ${subjectCode}`.toLowerCase()
        });
      }

      const subject = subjectMap.get(key);
      subject.count += 1;
      if (year > subject.latestYear) subject.latestYear = year;
    });

    return [...subjectMap.values()].sort((a, b) =>
      a.subject_name.localeCompare(b.subject_name)
    );
  }

  function renderSubjects(subjects = []) {
    if (!ui.grid) return;

    if (!subjects.length) {
      ui.grid.innerHTML = '';
      ui.grid.style.display = 'none';
      ui.emptyState?.classList.remove('hidden');
      return;
    }

    ui.grid.innerHTML = subjects.map((subject, index) => {
      const p = palette[index % palette.length];
      const url = `subject-papers.html?subject=${encodeURIComponent(subject.subject_name)}&code=${encodeURIComponent(subject.subject_code)}`;

      return `
        <a href="${url}"
           class="group block bg-white dark:bg-slate-800 border border-gray-200 dark:border-white/10 rounded-3xl p-5 hover:shadow-xl transition-all duration-300 card-hover"
           data-search="${escHtml(subject.searchText)}">
          <div class="flex items-start justify-between gap-4 mb-5">
            <div class="w-11 h-11 rounded-2xl flex items-center justify-center shadow-sm border border-black/5 dark:border-white/10"
                 style="background:${p.bg}; color:${p.color};">
              <span class="material-symbols-outlined text-[22px]">${p.icon}</span>
            </div>
            ${subject.latestYear ? `
              <span class="inline-flex items-center rounded-full bg-slate-100 dark:bg-white/10 px-2.5 py-1 text-[11px] font-bold text-slate-500 dark:text-slate-300">
                ${subject.latestYear}
              </span>
            ` : ''}
          </div>

          <div class="mb-5 min-w-0">
            <h3 class="text-xl font-black tracking-tight text-gray-900 dark:text-white mb-1 group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors line-clamp-2">
              ${escHtml(subject.subject_name)}
            </h3>
            <p class="font-mono text-sm text-gray-500 dark:text-gray-400 truncate">
              ${escHtml(subject.subject_code || 'General subject')}
            </p>
          </div>

          <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-white/10">
            <div class="px-3 py-1 bg-gray-100 dark:bg-white/10 text-gray-600 dark:text-gray-300 text-xs font-bold rounded-2xl">
              ${subject.count} Paper${subject.count === 1 ? '' : 's'}
            </div>
            <div class="text-brand-600 dark:text-brand-400 group-hover:translate-x-1 transition-transform">
              <span class="material-symbols-outlined">arrow_forward</span>
            </div>
          </div>
        </a>
      `;
    }).join('');

    ui.grid.classList.remove('hidden');
    ui.grid.style.display = 'grid';
  }

  function filterSubjects() {
    if (!ui.grid || !ui.search) return;

    const query = ui.search.value.toLowerCase().trim();
    const cards = [...ui.grid.querySelectorAll('a[data-search]')];
    let visible = 0;

    cards.forEach(card => {
      const searchText = String(card.dataset.search || '').toLowerCase();
      const shouldShow = !query || searchText.includes(query);
      card.style.display = shouldShow ? '' : 'none';
      if (shouldShow) visible += 1;
    });

    ui.noResults?.classList.toggle('hidden', !(visible === 0 && cards.length > 0));

    if (ui.searchStatus) {
      ui.searchStatus.textContent = query
        ? `${visible} subject${visible === 1 ? '' : 's'} found for ${query}.`
        : `${visible} subjects available.`;
    }
  }

  async function loadSubjects() {
    resetUi();

    try {
      const timeoutPromise = new Promise((_, reject) =>
        setTimeout(() => reject(new Error('Subjects request timed out after 8 seconds.')), 8000)
      );

      const fetchPromise = supabase
        .from('past_papers')
        .select('id, subject_code, subject_name, year')
        .order('subject_name', { ascending: true });

      const { data, error } = await Promise.race([fetchPromise, timeoutPromise]);
      if (error) throw error;

      ui.loading && (ui.loading.style.display = 'none');

      const subjects = buildSubjects(data || []);
      renderSubjects(subjects);

      if (ui.badge && ui.badgeText) {
        ui.badgeText.textContent = `${subjects.length} Subject${subjects.length === 1 ? '' : 's'}`;
        ui.badge.style.display = subjects.length ? 'inline-flex' : 'none';
      }

      filterSubjects();
    } catch (error) {
      showError(error?.message || 'Something went wrong while loading subjects.');
    }
  }

  ui.search?.addEventListener('input', debounce(filterSubjects, 120));
  loadSubjects();
</script>

    <script type="module" src="js/layout.js"></script>
</body>
</html>
